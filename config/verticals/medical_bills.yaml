# The Negotiator — medical-bills vertical config
# Challenge requirement: vertical-specific parameters are CONFIG, NOT CODE.
# Swapping this file (see moving.yaml stub) retargets the whole system.
# Owners: structure = Hamza · contents (benchmarks, statutes, flags) = J · personas/voice = Kar Shin

vertical: medical_bills

# ── Red-flag detection parameters (deterministic engine, apps/api) ────────
red_flags:
  duplicate:
    match_on: [cpt, date_of_service]        # same code + same day
    min_amount: 25
  upcode:
    em_pairs:                                # billed vs. records-supported E/M candidates
      - { billed: "99285", suspect_if_supported: ["99282", "99283"] }
      - { billed: "99215", suspect_if_supported: ["99212", "99213"] }
    low_acuity_dx: ["J06.9", "J00", "R51.9"] # dx that don't support a top-level E/M (demo seeds J06.9)
  unbundle:
    ncci_table: data/seed/ncci_pairs.json    # J ships pairs for the demo codes
  eob_mismatch:
    tolerance_usd: 1.00                      # bill balance vs EOB patient responsibility
  markup:
    flag_above_band_multiple: 1.0            # any line above band_high
  nsa:                                       # No Surprises Act — protected out-of-network emergency/ancillary balance bill
    ancillary_kinds: [anesthesia, er_physician_group, radiology, pathology]  # providers a patient can't choose in an emergency
    out_of_network_markers: ["out-of-network", "out of network"]             # how a line's spec marks the provider OON
    min_impact: 100                          # protected surprise-balance delta (billed − in-network share) must be material to fire

# ── Fair-price band (deterministic math) ─────────────────────────────────
benchmark:
  band_low_multiple: 1.5                     # x Medicare — fair-band bottom
  band_high_multiple: 2.5                    # x Medicare — fair-band top (RAND commercial norm ~2.54x)
  self_pay_target_multiple_low: 1.5          # anchor zone for self-pay asks (150–200% of Medicare)
  self_pay_target_multiple_high: 2.0

# ── Routing thresholds (decision table from Research.md) ─────────────────
thresholds:
  collections_route: { when: "entity.kind == 'collections'" }
  # Charity/financial-assistance arms via EITHER the flat FPL gate (fpl <= max_fpl_percent)
  # OR MA Health Safety Net Medical Hardship. MA HSN Medical Hardship has NO FPL ceiling:
  # qualifying medical expenses must exceed a rising % of countable income (higher income →
  # higher bar), and it is retroactive to bills up to 12 months old. Nonprofit-gated in code.
  charity_lead:
    max_fpl_percent: 400
    requires: "bill.nonprofit_status"
    medical_hardship:
      enabled: true
      min_expense_pct_of_income: { 305: 20, 405: 25, 605: 30, above: 40 }
  nsa_do_not_negotiate: { when: "flag.nsa", action: "cite_statute_and_file_complaint" }
  low_priority_usd: 500                      # already off credit reports — deprioritize

# ── Negotiation ladder (the Closer state machine walks this) ─────────────
ladder:
  provider:
    - open_and_hold_account                  # + request itemized bill/UB-04 if missing
    - reach_authority                        # supervisor / financial counselor / patient advocate
    - financial_assistance_screen            # charity care FIRST — reframes the call
    - line_item_disputes                     # walk armed error flags one at a time
    - benchmark_anchor                       # Medicare + hospital's own MRF cash price
    - self_pay_prompt_pay_ask
    - lump_sum_settlement
    - payment_plan_fallback
    - escalate_or_exit
  collections:
    - diagnostic_questions                   # interest? own the debt? settlement floor?
    - debt_validation_posture
    - lump_sum_anchor                        # 20–30% of balance
    - settle                                 # accept 25–50% with written paid-in-full
    - exit_with_written_confirmation

# ── Question-coverage gate (deterministic engine, apps/api) ──────────────
# The agent reports which questions it covered (questions_asked tags on
# report_lever_result); the state machine won't let it walk OFF a rung below
# until the required tags are covered — one block max per rung, so a live
# call is never hard-deadlocked. Tag vocabulary is mirrored into the
# report_lever_result tool description in scripts/provision_elevenlabs.py.
required_questions:
  open_and_hold_account: [account_hold_requested, records_alignment_confirmed, rep_name_captured]
  financial_assistance_screen: [fap_exists, pauses_collections_while_pending]
  diagnostic_questions: [interest_accruing, will_sue, credit_bureau_reported, debt_owned_or_bought, predetermined_settlement_floor]

# ── Escalation & parking policy (state machine, apps/api) ────────────────
# Escalation is a LAST RESORT (Hamza, 07-18 test-call feedback): a stonewall no
# longer jumps straight to a supervisor. Instead the topic is PARKED as an open
# item and the agent moves to the next lever. reach_authority arms only when
# every other lever is attempted/parked with something material still open, OR
# the rep's own words say only someone with authority can act (authority_triggers).
escalation_policy: last_resort

escalation_triggers:                         # stonewall phrases — now PARK the topic (was → reach_authority)
  - "that's our policy"
  - "we don't negotiate"
  - "there's nothing i can do"
  - "you need to talk to your insurance"

authority_triggers:                          # rep says only authority can act → arm reach_authority
  - "i don't have the authority"
  - "don't have the authority"
  - "not authorized"
  - "only a supervisor"
  - "only a manager"
  - "that would have to be a supervisor"
  - "you'd have to talk to a supervisor"
  - "above my pay grade"

hedge_markers:                               # temporary/soft refusals — NOT a hard impasse (don't count toward parking)
  - "right now"
  - "at the moment"
  - "not today"
  - "call back later"

# Collections threats the rep may voice. While a nonprofit account is still inside
# the 120-day 501(r) window (26 CFR 1.501(r)-6), such a threat is premature — the
# state machine arms a flat, factual pushback (no menace) in report_lever_result notes.
collections_threat_phrases:
  - "send you to collections"
  - "collection agency"
  - "report this"

# Authorization challenge — the rep questions the caller's authority/identity to
# discuss the account ("do you have authorization?", "HIPAA", "release on file",
# "verify identity", "I can't discuss this with you"). The state machine folds a
# note into report_lever_result arming the authorization move: present the
# patient's RECORDED authorization (read it verbatim, be explicit it is a recorded
# authorization on file, not audio played over the line) and offer to send the
# recording + a written release. Tool-gated: the agent calls get_authorization and
# may only claim a recording the tool confirms (on_file true). NO menace, no
# overclaiming — a recording is not a signed 164.508 form; never say it is.
authorization_challenge_phrases:
  - "authorization"
  - "authorized to"
  - "hipaa"
  - "release on file"
  - "release of information"
  - "verify identity"
  - "verify your identity"
  - "can't discuss"
  - "cannot discuss"
  - "who are you to"
  - "on the account"

# Parked open items are re-attempted this many hours after the call (caller-side
# APScheduler; auto-dials only when ELEVENLABS_OUTBOUND_ENABLED is set).
callback_delay_hours: 5

# ── Personas roster (agents created in ElevenLabs; hidden params in DB) ──
personas:
  - { key: stonewaller,   file: prompts/personas/stonewaller.md }
  - { key: policy_citer,  file: prompts/personas/policy_citer.md }
  - { key: no_authority,  file: prompts/personas/no_authority.md }
  - { key: collections,   file: prompts/personas/collections.md }

# ── Simulator (POST /calls/launch?simulate=true — app/simulator.py) ───────
# entity.kind → replay scenario. Config-not-code: flip a mapping here to change
# which simulated arc an entity plays — no router change. Unmapped kinds fall
# back to a generic policy_citer replay (never a silent skip). DEMO DEFAULT is
# unchanged; to replay the facility WIN ($4,287 → $1,650 settle), set
# facility: human_facility_supervisor.
simulator:
  entity_personas:
    facility: gruff_stonewaller
    er_physician_group: policy_citer
    collections: collections_agent

# ── Voice (ElevenLabs settings, from operational-call-flow-spec.md) ──────
voice:
  model: eleven_flash_v2_5                   # ~75ms; do NOT use v3 for live calls
  # Default ElevenLabs voice for the negotiator + any agent without a name match.
  # Kar Shin's pick (2026-07-18). Personas keep their own distinct voices.
  # NOTE: Jason W. — Hamza's own voice design (07-18 night), replaces Adam. Susy's original
  # (PK6t0r2iXSJEz1l0Gy4k) lives in her personal account and is not assignable here.
  default_voice_id: 8duqbsrxNeN6j4yugadv
  stability: 0.55
  speed: 0.85                                # Hamza (07-18 late): slower still after hearing 0.9 on a live call; ElevenLabs range 0.7–1.2
  # Brain LLM for the negotiator, pinned by provisioning (Hamza, 07-18 evening:
  # quality over latency for live calls; was gemini-2.5-flash on cost).
  negotiator_llm: gpt-5.4
  target_wpm: 130                            # Hamza (07-18 late): slower pace after the live call (was 150)
  endpointing_ms: 400                        # bias toward waiting; barge-in on
  delivery_notes: prompts/verbalization_guide.md

# ── Disclosure & honesty ─────────────────────────────────────────────────
# Policy: disclose-only-if-asked (team decision, Kar Shin). Alex does NOT proactively
# announce AI status; it opens competence-first and confirms honestly the moment it's
# asked, never denying. Trades against C1/TCPA/SB1001 proactive-disclosure — owned on a
# deck slide. `opening_line` is retained (not used as the opener) so we can revert to
# early/late disclosure without re-authoring it.
disclosure:
  mode: only_if_asked          # only_if_asked | late | early
  # First message is the office-confirmation beat: one double-barreled question
  # that confirms you reached the billing office AND gets the answerer's name, and
  # NOTHING else (no account, no reason) until the office part is confirmed (Hamza,
  # 07-19: wrong-party PHI guard, share nothing until you know it is the billing
  # office). {{target_entity}} resolves per-call via dynamic_variables; if it does
  # not resolve, negotiator_first_message() falls back to "the billing office" plain.
  # The warm feeler, context sentence, and account number follow on later turns (see
  # negotiator_system.md Turn-length section: office-confirm → feeler → context → item).
  competence_first_open: >-
    Hi, this is Alex. Have I reached the billing office at {{target_entity}},
    and who am I speaking with?
  # Early-disclosure opener: ONLY valid when mode == early. Audit finding (a2a-1):
  # a stale sync once shipped this as the live opener while mode was only_if_asked —
  # the early_ prefix + gate comment exist so provisioning drift can't re-select it.
  early_mode_opening_line: >-
    Hi, my name is Alex — I'm an AI assistant calling on behalf of your patient
    {{patient_name}}, who has authorized me to discuss account {{account_number}}.
    This call may be recorded on both ends.
  if_asked_are_you_a_robot: >-
    I am — I'm an AI advocate authorized by the patient, and I have the
    account details ready whenever you are.
  never_deny_ai: true          # absolute: honesty-when-asked is non-negotiable
honesty:
  citable_sources_only: [dossier, get_benchmark]   # the agent may not speak a number from anywhere else
  forbidden: [invented_bids, invented_inventory, invented_dates, misrepresenting_the_job]
