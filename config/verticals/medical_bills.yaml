# The Negotiator — medical-bills vertical config
# Challenge requirement: vertical-specific parameters are CONFIG, NOT CODE.
# Swapping this file (see moving.yaml stub) retargets the whole system.
# Owners: structure = Hamza · contents (benchmarks, statutes, flags) = J · personas/voice = Kar Shin

vertical: medical_bills

# ── Red-flag detection parameters (deterministic engine, apps/api) ────────
red_flags:
  duplicate:
    match_on: [cpt, date_of_service]        # same code + same day
    min_amount: 25
  upcode:
    em_pairs:                                # billed vs. records-supported E/M candidates
      - { billed: "99285", suspect_if_supported: ["99282", "99283"] }
      - { billed: "99215", suspect_if_supported: ["99212", "99213"] }
    low_acuity_dx: ["J06.9", "J00", "R51.9"] # dx that don't support a top-level E/M (demo seeds J06.9)
  unbundle:
    ncci_table: data/seed/ncci_pairs.json    # J ships pairs for the demo codes
  eob_mismatch:
    tolerance_usd: 1.00                      # bill balance vs EOB patient responsibility
  markup:
    flag_above_band_multiple: 1.0            # any line above band_high

# ── Fair-price band (deterministic math) ─────────────────────────────────
benchmark:
  band_low_multiple: 1.5                     # x Medicare — fair-band bottom
  band_high_multiple: 2.5                    # x Medicare — fair-band top (RAND commercial norm ~2.54x)
  self_pay_target_multiple_low: 1.5          # anchor zone for self-pay asks (150–200% of Medicare)
  self_pay_target_multiple_high: 2.0

# ── Routing thresholds (decision table from Research.md) ─────────────────
thresholds:
  collections_route: { when: "entity.kind == 'collections'" }
  charity_lead:      { max_fpl_percent: 400, requires: "bill.nonprofit_status" }
  nsa_do_not_negotiate: { when: "flag.nsa", action: "cite_statute_and_file_complaint" }
  low_priority_usd: 500                      # already off credit reports — deprioritize

# ── Negotiation ladder (the Closer state machine walks this) ─────────────
ladder:
  provider:
    - open_and_hold_account                  # + request itemized bill/UB-04 if missing
    - reach_authority                        # supervisor / financial counselor / patient advocate
    - financial_assistance_screen            # charity care FIRST — reframes the call
    - line_item_disputes                     # walk armed error flags one at a time
    - benchmark_anchor                       # Medicare + hospital's own MRF cash price
    - self_pay_prompt_pay_ask
    - lump_sum_settlement
    - payment_plan_fallback
    - escalate_or_exit
  collections:
    - diagnostic_questions                   # interest? own the debt? settlement floor?
    - debt_validation_posture
    - lump_sum_anchor                        # 20–30% of balance
    - settle                                 # accept 25–50% with written paid-in-full
    - exit_with_written_confirmation

escalation_triggers:                         # stonewall phrases → reach_authority move
  - "that's our policy"
  - "we don't negotiate"
  - "there's nothing i can do"
  - "you need to talk to your insurance"

# ── Personas roster (agents created in ElevenLabs; hidden params in DB) ──
personas:
  - { key: stonewaller,   file: prompts/personas/stonewaller.md }
  - { key: policy_citer,  file: prompts/personas/policy_citer.md }
  - { key: no_authority,  file: prompts/personas/no_authority.md }
  - { key: collections,   file: prompts/personas/collections.md }

# ── Voice (ElevenLabs settings, from operational-call-flow-spec.md) ──────
voice:
  model: eleven_flash_v2_5                   # ~75ms; do NOT use v3 for live calls
  # Default ElevenLabs voice for the negotiator + any agent without a name match.
  # Kar Shin's pick (2026-07-18). Personas keep their own distinct voices.
  # NOTE: Adam (stock workspace voice) — Hamza's pick 07-18 late, was the Alex clone. Susy's original
  # (PK6t0r2iXSJEz1l0Gy4k) lives in her personal account and is not assignable here.
  default_voice_id: pNInz6obpgDQGcFmaJgB
  stability: 0.55
  speed: 0.9                                 # Hamza (07-18): slower so numbers stay legible; keep within 0.9–1.1
  # Brain LLM for the negotiator, pinned by provisioning (Hamza, 07-18 evening:
  # quality over latency for live calls; was gemini-2.5-flash on cost).
  negotiator_llm: gpt-5.4
  target_wpm: 150
  endpointing_ms: 400                        # bias toward waiting; barge-in on
  delivery_notes: prompts/verbalization_guide.md

# ── Disclosure & honesty ─────────────────────────────────────────────────
# Policy: disclose-only-if-asked (team decision, Kar Shin). Alex does NOT proactively
# announce AI status; it opens competence-first and confirms honestly the moment it's
# asked, never denying. Trades against C1/TCPA/SB1001 proactive-disclosure — owned on a
# deck slide. `opening_line` is retained (not used as the opener) so we can revert to
# early/late disclosure without re-authoring it.
disclosure:
  mode: only_if_asked          # only_if_asked | late | early
  competence_first_open: >-
    Hi, this is Alex. I'm calling about {{patient_name}}'s account, number
    {{account_number}}. Got a minute?
  # Early-disclosure opener: ONLY valid when mode == early. Audit finding (a2a-1):
  # a stale sync once shipped this as the live opener while mode was only_if_asked —
  # the early_ prefix + gate comment exist so provisioning drift can't re-select it.
  early_mode_opening_line: >-
    Hi, my name is Alex — I'm an AI assistant calling on behalf of your patient
    {{patient_name}}, who has authorized me to discuss account {{account_number}}.
    This call may be recorded on both ends.
  if_asked_are_you_a_robot: >-
    I am — I'm an AI advocate authorized by the patient, and I have the
    account details ready whenever you are.
  never_deny_ai: true          # absolute: honesty-when-asked is non-negotiable
honesty:
  citable_sources_only: [dossier, get_benchmark]   # the agent may not speak a number from anywhere else
  forbidden: [invented_bids, invented_inventory, invented_dates, misrepresenting_the_job]
